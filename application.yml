cors:
  allowed-origins:
    - "http://example.com"
    - "http://another-example.com"
  allowed-methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
  allowed-headers:
    - "Authorization"
    - "Content-Type"
  allow-credentials: true
  max-age: 3600
  exposed-headers:
    - "Authorization"