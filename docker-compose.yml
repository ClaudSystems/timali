services:
  postgres:
    image: postgres:17
    container_name: timali_postgres
    environment:
      POSTGRES_DB: timali_db
      POSTGRES_USER: timali_user
      POSTGRES_PASSWORD: timali_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timali_user -d timali_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
