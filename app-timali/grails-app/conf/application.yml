---
grails:
  profile: web
  codegen:
    defaultPackage: app.timali
  gorm:
    reactor:
      events: false

  # ========== CONFIGURAÇÃO MIME TYPES ==========
  mime:
    disable:
      accept:
        header:
          userAgentDetection: false
    types:
      json:
        - application/json
        - text/json
        - application/hal+json
      xml:
        - application/xml
        - text/xml
    default: json

  # ========== CONFIGURAÇÃO REST ==========
  rest:
    hal:
      enabled: false
    json:
      deep: true
      pretty: true

  # ========== CONFIGURAÇÃO CORS ==========
  cors:
    enabled: true
    mappings:
      '/api/**':
        allowedOrigins:
          - 'http://localhost:3000'
          - 'http://localhost:3001'
        allowedMethods:
          - 'GET'
          - 'POST'
          - 'PUT'
          - 'DELETE'
          - 'OPTIONS'
          - 'PATCH'
        allowedHeaders:
          - '*'
          - 'Authorization'
          - 'Content-Type'
          - 'Accept'
          - 'X-Requested-With'
        allowCredentials: true
        maxAge: 3600

  # ========== CONFIGURAÇÃO DE UPLOAD ==========
  controllers:
    upload:
      maxFileSize: 10485760      # 10MB
      maxRequestSize: 10485760   # 10MB

  # ========== SPRING SECURITY ==========
  plugin:
    springsecurity:
      userLookup:
        userDomainClassName: 'app.timali.Usuario'
        authorityJoinClassName: 'app.timali.UsuarioRole'
      authority:
        className: 'app.timali.Role'
      cors:
        enabled: true
      csrf:
        active: false
      controllerAnnotations:
        staticRules:
          - {pattern: '/',               access: ['permitAll']}
          - {pattern: '/error',          access: ['permitAll']}
          - {pattern: '/api/login',      access: ['permitAll']}
          - {pattern: '/api/**',         access: ['isFullyAuthenticated()']}
          - {pattern: '/**',             access: ['permitAll']}
      rest:
        login:
          active: true
          endpointUrl: '/api/login'
        token:
          storage:
            jwt:
              secret: 'timali-super-secret-key-for-jwt-2026-xyz-must-be-long-enough-to-work'
              expiration: 3600
        cors:
          enabled: true

info:
  app:
    name: '@info.app.name@'
    version: '@info.app.version@'
    grailsVersion: '@info.app.grailsVersion@'

spring:
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB

hibernate:
  cache:
    queries: false
  dialect: org.hibernate.dialect.PostgreSQLDialect
  hbm2ddl:
    auto: update
  show_sql: true
  format_sql: true

dataSource:
  pooled: true
  driverClassName: org.postgresql.Driver
  username: timali_user
  password: timali_password
  dbCreate: update

environments:
  development:
    dataSource:
      dbCreate: update
      url: jdbc:postgresql://localhost:5433/timali_db
      driverClassName: org.postgresql.Driver
      username: timali_user
      password: timali_password

timali:
  storage:
    path: data/documents
    encryptionKey: TimaliSecretKey2024!@#$%
    maxFileSize: 10485760  # 10MB