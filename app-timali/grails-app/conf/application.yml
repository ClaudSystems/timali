---
grails:
    profile: web
    codegen:
        defaultPackage: app.timali
    gorm:
        reactor:
            events: false

    # Configuração CORS Nativa do Grails (Garante headers básicos)
    cors:
        enabled: true
        mappings:
            '/**':
                allowedOrigins:
                    - 'http://localhost:3000'
                allowedMethods:
                    - 'GET'
                    - 'POST'
                    - 'PUT'
                    - 'DELETE'
                    - 'OPTIONS'
                    - 'PATCH'
                allowedHeaders:
                    - '*'
                    - 'Authorization'
                    - 'Content-Type'
                allowCredentials: true
                maxAge: 3600

    plugin:
        springsecurity:
            userLookup:
                userDomainClassName: 'app.timali.Usuario'
                authorityJoinClassName: 'app.timali.UsuarioRole'
            authority:
                className: 'app.timali.Role'

            # Habilitar suporte CORS no plugin Spring Security
            cors:
                enabled: true
                # Garante que as configurações acima do grails.cors sejam respeitadas
                useGrailsCorsConfig: true

            # Desativar CSRF (Essencial para APIs REST stateless)
            csrf:
                active: false

            controllerAnnotations:
                staticRules:
                    - {pattern: '/',               access: ['permitAll']}
                    - {pattern: '/error',          access: ['permitAll']}
                    # O login deve ser público
                    - {pattern: '/api/login',      access: ['permitAll']}
                    # O resto da API requer autenticação
                    - {pattern: '/api/**',         access: ['isFullyAuthenticated()']}
                    # Fallback para outras rotas
                    - {pattern: '/**',             access: ['permitAll']}

            filterChain:
                chainMap:
                    # REGRA CRÍTICA 1: Intercepta OPTIONS antes de qualquer segurança
                    # Usa apenas o corsFilter e o anonymousAuthenticationFilter
                    - {pattern: '/**', httpMethods: 'OPTIONS', filters: 'corsFilter,anonymousAuthenticationFilter'}

                    # REGRA CRÍTICA 2: Login sem validação de token JWT, mas com outros filtros necessários
                    - {pattern: '/api/login',      filters: 'JOINED_FILTERS,-exceptionTranslationFilter,-authenticationProcessingFilter,-securityContextPersistenceFilter,-rememberMeAuthenticationFilter,-restTokenValidationFilter'}

                    # REGRA CRÍTICA 3: Resto da API com validação de Token
                    - {pattern: '/api/**',         filters: 'JOINED_FILTERS,-restTokenValidationFilter,-restExceptionTranslationFilter'}

                    # Regra padrão para outras rotas
                    - {pattern: '/**',             filters: 'JOINED_FILTERS'}

            rest:
                login:
                    active: true
                    endpointUrl: '/api/login'
                token:
                    storage:
                        jwt:
                            secret: 'timali-super-secret-key-for-jwt-2026-xyz'
                            expiration: 3600
                cors:
                    enabled: true
                    # Explicitamente permitir a origem também na config do REST
                    allowedOrigins:
                        - 'http://localhost:3000'

info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'

spring:
    main:
        allow-bean-definition-overriding: true

hibernate:
    cache:
        queries: false
    dialect: org.hibernate.dialect.PostgreSQLDialect

dataSource:
    pooled: true
    driverClassName: org.postgresql.Driver
    username: timali_user
    password: timali_password

environments:
    development:
        dataSource:
            dbCreate: update
            url: jdbc:postgresql://localhost:5433/timali_db